<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ET710 Assignment 7</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <div class="main-window">

        <div class="card">
            <img src="cat.jpg" alt="Cat">
            <p class="desc">Do You Like Cats?</p>
            <a href="#modal1" class="btn-modal">Click for Kittens</a>
        </div>

        <div class="card">
            <img src="dog.jpg" alt="Dog">
            <p class="desc">Do You Like Dogs?</p>
            <a href="#modal2" class="btn-modal">Click for Puppies</a>
        </div>

    </div>

    <div id="modal1" class="modal-overlay modal-blue">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Here are a bunch of kittens.</h2>
                <a href="#" class="modal-close">X</a>
            </div>
            <div class="modal-body modal-body-orange">
                <p>There are a whole bunch of kittens in this basket.</p>
                <img src="kittens.jpg" alt="Kittens">
            </div>
        </div>
    </div>

    <div id="modal2" class="modal-overlay modal-green">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Here are a bunch of puppies.</h2>
                <a href="#" class="modal-close">X</a>
            </div>
            <div class="modal-body modal-body-blue">
                <p>There are a whole bunch of puppies in this basket.</p>
                <img src="puppies.jpg" alt="Puppies">
            </div>
        </div>
    </div>

</body>
</html>
