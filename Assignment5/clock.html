<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="clock-wrapper">
        <div class="clock-face">
            <img src="clockimg.png" alt="clock face">
            <div class="minute-hand">
                <img src="hand.png" alt="minute hand">
            </div>
            <div class="hour-hand">
                <img src="hand.png" alt="hour hand">
            </div>
        </div>
    </div>

</body>
</html>
